name: dbt CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  DBT_PROFILES_DIR: .
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
  # Garante compatibilidade com runners modernos (Node 24)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  dbt-lint:
    name: 🔍 SQL Lint & Style Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install SQLFluff
        run: |
          pip install sqlfluff sqlfluff-templater-dbt
      
      - name: Lint SQL files
        run: |
          cd dbt_project
          sqlfluff lint models/ --dialect databricks --exclude-rules L034,L036
        continue-on-error: true # Não trava o pipeline se houver erros de estilo

  dbt-compile:
    name: 🔨 Compile dbt Models
    runs-on: ubuntu-latest
    needs: dbt-lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dbt
        run: |
          pip install dbt-databricks==1.7.0
      
      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          databricks:
            target: ci
            outputs:
              ci:
                type: databricks
                catalog: workspace
                schema: airbnb_ci
                host: ${{ secrets.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
                token: ${{ secrets.DATABRICKS_TOKEN }}
                threads: 4
          EOF
      
      - name: Install dbt dependencies
        run: |
          cd dbt_project
          dbt deps
      
      - name: Compile dbt models
        run: |
          cd dbt_project
          dbt compile --target ci
      
      - name: Upload compiled files
        uses: actions/upload-artifact@v4
        with:
          name: compiled-models
          path: dbt_project/target/compiled/

  dbt-test:
    name: 🧪 Run dbt Tests
    runs-on: ubuntu-latest
    needs: dbt-compile
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dbt
        run: |
          pip install dbt-databricks==1.7.0
      
      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          databricks:
            target: ci
            outputs:
              ci:
                type: databricks
                catalog: workspace
                schema: airbnb_ci
                host: ${{ secrets.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
                token: ${{ secrets.DATABRICKS_TOKEN }}
                threads: 4
          EOF
      
      - name: Install dbt dependencies
        run: |
          cd dbt_project
          dbt deps
      
      - name: Run dbt tests on sources
        run: |
          cd dbt_project
          dbt test --select source:* --target ci
      
      - name: Run dbt tests on silver layer
        run: |
          cd dbt_project
          dbt test --select silver --target ci
      
      - name: Generate test results report
        if: always()
        run: |
          cd dbt_project
          dbt docs generate --target ci
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-test-results
          path: dbt_project/target/run_results.json

  dbt-build-silver:
    name: 🥈 Build Silver Layer
    runs-on: ubuntu-latest
    needs: dbt-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dbt
        run: |
          pip install dbt-databricks==1.7.0
      
      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          databricks:
            target: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
            outputs:
              dev:
                type: databricks
                catalog: workspace
                schema: airbnb_dev
                host: ${{ secrets.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
                token: ${{ secrets.DATABRICKS_TOKEN }}
                threads: 4
              prod:
                type: databricks
                catalog: workspace
                schema: airbnb
                host: ${{ secrets.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
                token: ${{ secrets.DATABRICKS_TOKEN }}
                threads: 8
          EOF
      
      - name: Install dbt dependencies
        run: |
          cd dbt_project
          dbt deps
      
      - name: Build silver layer
        run: |
          cd dbt_project
          dbt build --select silver --target ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

  dbt-build-gold:
    name: 🥇 Build Gold Layer
    runs-on: ubuntu-latest
    needs: dbt-build-silver
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dbt
        run: |
          pip install dbt-databricks==1.7.0
      
      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          databricks:
            target: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
            outputs:
              dev:
                type: databricks
                catalog: workspace
                schema: airbnb_dev
                host: ${{ secrets.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
                token: ${{ secrets.DATABRICKS_TOKEN }}
                threads: 4
              prod:
                type: databricks
                catalog: workspace
                schema: airbnb
                host: ${{ secrets.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
                token: ${{ secrets.DATABRICKS_TOKEN }}
                threads: 8
          EOF
      
      - name: Install dbt dependencies
        run: |
          cd dbt_project
          dbt deps
      
      - name: Build gold dimensions
        run: |
          cd dbt_project
          dbt build --select gold,tag:dimension --target ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
      
      - name: Build gold facts
        run: |
          cd dbt_project
          dbt build --select gold,tag:fact --target ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

  dbt-docs:
    name: 📚 Generate & Deploy Documentation
    runs-on: ubuntu-latest
    needs: dbt-build-gold
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dbt
        run: |
          pip install dbt-databricks==1.7.0
      
      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          databricks:
            target: prod
            outputs:
              prod:
                type: databricks
                catalog: workspace
                schema: airbnb
                host: ${{ secrets.DATABRICKS_HOST }}
                http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}
                token: ${{ secrets.DATABRICKS_TOKEN }}
                threads: 8
          EOF
      
      - name: Install dbt dependencies
        run: |
          cd dbt_project
          dbt deps
      
      - name: Generate dbt docs
        run: |
          cd dbt_project
          dbt docs generate --target prod
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4 # Atualizado para v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dbt_project/target
          publish_branch: gh-pages